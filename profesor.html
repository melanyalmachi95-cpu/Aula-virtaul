<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula Virtual - Profesor</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <div class="container">
        <header class="dashboard-header">
            <h1 id="bienvenidaProfesor"></h1>
            <div class="header-buttons">
                <a href="profesor-entregas.html" class="btn btn-success">Ver Entregas</a>
                <button id="logoutBtn" class="btn btn-secondary">Cerrar Sesión</button>
            </div>
        </header>
        
        <div class="dashboard-content">
            <section class="create-task-section">
                <h2>Crear Nueva Tarea</h2>
                <form id="crearTareaForm">
                    <div class="form-group">
                        <label for="tareaTitulo">Título</label>
                        <input type="text" id="tareaTitulo" required>
                    </div>
                    <div class="form-group">
                        <label for="tareaDescripcion">Descripción</label>
                        <textarea id="tareaDescripcion" rows="4" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="tareaFechaLimite">Fecha Límite</label>
                        <input type="date" id="tareaFechaLimite" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar Tarea</button>
                </form>
            </section>
            
            <section class="tasks-section">
                <h2>Mis Tareas Creadas</h2>
                <div id="listaTareasProfesor" class="tasks-list"></div>
            </section>
        </div>
    </div>
    <script src="js/auth.js"></script>
    <script src="js/tareas.js"></script>
    <script src="js/main.js"></script>
</body>
